<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Intro Canvas 2D</title>
<link rel="icon" type="image/png" href="./assets/img/circulos.png">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="./assets/css/style.css">
</head>

<body>

<!-- HEADER -->
<header class="bg-dark text-white shadow-sm">
<div class="container py-3 d-flex justify-content-between align-items-center">
<h3 class="m-0">Canvas 2D</h3>
<span class="text-light">Programación Orientada a Objetos</span>
</div>
</header>

<!-- CONTENIDO -->
<main class="container py-5">

<div class="text-center mb-5">
<h1 class="fw-bold">Objetos 2D con Canvas</h1>
<p class="text-muted">Ejemplo de uso de clases, random y múltiples objetos en HTML5 Canvas</p>
</div>

<div class="row g-4">

<!-- Canvas 1 -->
<div class="col-md-4">
<div class="card shadow-sm canvas-card h-100">
<div class="card-body text-center">

<h5 class="card-title">Objeto 2D</h5>

<canvas id="canvasOOP" class="canvas-box"></canvas>

</div>
</div>
</div>

<!-- Canvas 2 -->
<div class="col-md-4">
<div class="card shadow-sm canvas-card h-100">
<div class="card-body text-center">

<h5 class="card-title">Objeto Random</h5>

<canvas id="canvasRandom" class="canvas-box"></canvas>

</div>
</div>
</div>

<!-- Canvas 3 -->
<div class="col-md-4">
<div class="card shadow-sm canvas-card h-100">
<div class="card-body text-center">

<h5 class="card-title">Múltiples Objetos</h5>

<canvas id="canvasMultiple" class="canvas-box"></canvas>

</div>
</div>
</div>

</div>

</main>

<!-- FOOTER -->
<footer class="bg-dark text-white mt-5">
<div class="container text-center py-3">

<p class="mb-1">Intro Canvas 2D • JavaScript</p>

<small class="text-muted">
© 2026 | Desarrollo Web
</small>

</div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="./assets/js/main.js"></script>

</body>
</html>
